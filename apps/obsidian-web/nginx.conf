server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/markdown;

    # env.js is generated at container startup with runtime OAuth config — never cache it
    location = /env.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache other static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # OAuth callback route - serve auth-callback.html for /auth/callback
    location = /auth/callback {
        try_files /auth-callback.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
