<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian — zappro.site</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 24px; color: #fff; }
    .vault-link { display: inline-block; padding: 12px 24px; background: #4285f4; color: white; text-decoration: none; border-radius: 8px; font-size: 16px; }
    .vault-link:hover { background: #3367d6; }
    .login-box { text-align: center; padding: 80px 20px; }
    .login-box p { color: #999; margin-bottom: 24px; font-size: 14px; }
    .login-btn { display: inline-block; padding: 14px 32px; background: #4285f4; color: white; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 500; }
    .login-btn:hover { background: #3367d6; }
  </style>
</head>
<body>
  <div class="container">
    <div id="auth-section" class="login-box" style="display:none">
      <h1>Obsidian Vault</h1>
      <p>Faz login com a tua conta Google para aceder ao teu vault</p>
      <a class="login-btn" id="login-btn" href="#">Entrar com Google</a>
    </div>
    <div id="app-section" style="display:none">
      <h1>Obsidian Vault</h1>
      <a class="vault-link" href="/vault/">Abrir Vault</a>
    </div>
  </div>
  <script src="env.js"></script>
  <script>
    var CONFIG = window.__ENV__ || {};
    var AUTH_ENDPOINT = 'https://accounts.google.com/o/oauth2/v2/auth';

    function base64urlencode(buffer) {
      var binary = '';
      var bytes = new Uint8Array(buffer);
      for (var i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    function getUser() {
      return {
        email: localStorage.getItem('obsidian_email'),
        name: localStorage.getItem('obsidian_name'),
        accessToken: localStorage.getItem('obsidian_token')
      };
    }

    function render() {
      var user = getUser();
      var authSection = document.getElementById('auth-section');
      var appSection = document.getElementById('app-section');
      if (!user.email) {
        authSection.style.display = 'block';
        appSection.style.display = 'none';
        buildLoginButton();
      } else {
        authSection.style.display = 'none';
        appSection.style.display = 'block';
      }
    }

    async function buildLoginButton() {
      var array = new Uint8Array(32);
      crypto.getRandomValues(array);
      var verifier = base64urlencode(array);
      sessionStorage.setItem('pkce_verifier', verifier);
      var hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
      var codeChallenge = base64urlencode(hashBuffer);
      var params = 'client_id=' + encodeURIComponent(CONFIG.GOOGLE_CLIENT_ID || '') +
        '&redirect_uri=' + encodeURIComponent(CONFIG.GOOGLE_REDIRECT_URI || 'https://obsidian.zappro.site/auth/callback') +
        '&response_type=code&scope=email%20profile&access_type=online&prompt=select_account&code_challenge_method=S256&code_challenge=' + encodeURIComponent(codeChallenge);
      document.getElementById('login-btn').href = AUTH_ENDPOINT + '?' + params;
    }

    render();
  </script>
</body>
</html>
