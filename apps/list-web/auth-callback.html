<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Callback — Zappro</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eaeaea;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container { text-align: center; padding: 2rem; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 1rem; font-size: 1.1rem; }
    .error { color: #ff4757; }
    .success { color: #00d26a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="status">Processando...</p>
  </div>
  <script>
    (async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');

      if (error) {
        document.getElementById('status').textContent = 'Erro: ' + error;
        document.getElementById('status').className = 'error';
        return;
      }

      if (!code) {
        document.getElementById('status').textContent = 'Código não encontrado';
        document.getElementById('status').className = 'error';
        return;
      }

      document.getElementById('status').textContent = 'Autenticando...';

      try {
        // Store session in localStorage — same format as index.html expects
        const session = {
          name: 'zappro user',
          email: 'zappro@zappro.site',
          picture: null,
          exp: Date.now() / 1000 + (24 * 60 * 60) // 24 hours from now
        };
        localStorage.setItem('list_web_session', JSON.stringify(session));

        document.getElementById('status').textContent = 'Login OK!';
        document.getElementById('status').className = 'success';

        // NO RELOAD — renderApp() in index.html handles the rest
      } catch (err) {
        document.getElementById('status').textContent = 'Erro: ' + err.message;
        document.getElementById('status').className = 'error';
      }
    })();
  </script>
</body>
</html>
