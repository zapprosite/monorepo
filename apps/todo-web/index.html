<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo — zappro.site</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
    .container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 32px; width: 100%; max-width: 480px; }
    h1 { font-size: 24px; margin-bottom: 16px; color: #1a1a1a; }
    .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #4285f4; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .user-email { font-size: 14px; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { font-size: 12px; color: #666; cursor: pointer; background: none; border: none; text-decoration: underline; flex-shrink: 0; }
    .add-form { display: flex; gap: 8px; margin-bottom: 20px; }
    .add-form input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .add-form input:focus { outline: none; border-color: #4285f4; }
    .add-form button { padding: 10px 20px; background: #4285f4; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .add-form button:hover { background: #3367d6; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .todo-item:last-child { border-bottom: none; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #999; }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
    .todo-text { flex: 1; font-size: 15px; color: #333; word-break: break-word; }
    .todo-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 4px; }
    .todo-delete:hover { color: #e53935; }
    .empty { text-align: center; color: #999; padding: 40px 0; font-size: 14px; }
    .login-box { text-align: center; padding: 40px 20px; }
    .login-box p { color: #666; margin-bottom: 24px; font-size: 14px; }
    .login-btn { display: inline-block; padding: 14px 32px; background: #4285f4; color: white; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 500; }
    .login-btn:hover { background: #3367d6; }
  </style>
</head>
<body>
  <div class="container">
    <div id="auth-section" class="login-box" style="display:none">
      <h1>Todo</h1>
      <p>Faz login com a tua conta Google para continuar</p>
      <a class="login-btn" id="login-btn" href="#">Entrar com Google</a>
    </div>
    <div id="app-section" style="display:none">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-email" id="user-email"></span>
        <button class="logout-btn" id="logout-btn">Sair</button>
      </div>
      <h1>Minhas Tarefas</h1>
      <form class="add-form" id="add-form">
        <input type="text" id="todo-input" placeholder="Nova tarefa..." autocomplete="off">
        <button type="submit">Adicionar</button>
      </form>
      <ul class="todo-list" id="todo-list"></ul>
    </div>
  </div>
  <script src="env.js"></script>
  <script>
    var CONFIG = window.__ENV__ || {};
    var AUTH_ENDPOINT = 'https://accounts.google.com/o/oauth2/v2/auth';
    var TOKEN_ENDPOINT = 'https://oauth2.googleapis.com/token';
    var USERINFO_ENDPOINT = 'https://www.googleapis.com/oauth2/v2/userinfo';
    var STORAGE_KEY = 'zappro_todos';

    function base64urlencode(buffer) {
      var binary = '';
      var bytes = new Uint8Array(buffer);
      for (var i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    function getUser() {
      return {
        email: localStorage.getItem('todo_email'),
        name: localStorage.getItem('todo_name'),
        accessToken: localStorage.getItem('todo_token')
      };
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function render() {
      var user = getUser();
      var authSection = document.getElementById('auth-section');
      var appSection = document.getElementById('app-section');
      if (!user.email) {
        authSection.style.display = 'block';
        appSection.style.display = 'none';
        buildLoginButton();
      } else {
        authSection.style.display = 'none';
        appSection.style.display = 'block';
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-avatar').textContent = user.name ? user.name[0].toUpperCase() : '?';
        renderTodos();
      }
    }

    function buildLoginButton() {
      var verifier = '';
      var array = new Uint8Array(32);
      crypto.getRandomValues(array);
      for (var i = 0; i < array.length; i++) {
        verifier += String.fromCharCode(array[i]);
      }
      verifier = base64urlencode(array);
      sessionStorage.setItem('pkce_verifier', verifier);
      var encodedVerifier = encodeURIComponent(verifier);
      var params = 'client_id=' + encodeURIComponent(CONFIG.GOOGLE_CLIENT_ID || '') +
        '&redirect_uri=' + encodeURIComponent(CONFIG.GOOGLE_REDIRECT_URI || 'https://todo.zappro.site/auth/callback') +
        '&response_type=code&scope=email%20profile&access_type=online&prompt=select_account&code_challenge_method=S256&code_challenge=' + encodeURIComponent(verifier);
      document.getElementById('login-btn').href = AUTH_ENDPOINT + '?' + params;
    }

    function renderTodos() {
      var todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      var list = document.getElementById('todo-list');
      if (todos.length === 0) {
        list.innerHTML = '<li class="empty">Nenhuma tarefa. Adiciona uma acima!</li>';
        return;
      }
      var html = '';
      for (var i = 0; i < todos.length; i++) {
        var t = todos[i];
        html += '<li class="todo-item' + (t.done ? ' done' : '') + '">' +
          '<input type="checkbox"' + (t.done ? ' checked' : '') + ' onclick="toggleTodo(' + i + ')">' +
          '<span class="todo-text">' + escapeHtml(t.text) + '</span>' +
          '<button class="todo-delete" onclick="deleteTodo(' + i + ')">x</button></li>';
      }
      list.innerHTML = html;
    }

    window.toggleTodo = function(index) {
      var todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      todos[index].done = !todos[index].done;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      renderTodos();
    };

    window.deleteTodo = function(index) {
      var todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      todos.splice(index, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      renderTodos();
    };

    document.getElementById('add-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var input = document.getElementById('todo-input');
      var text = input.value.trim();
      if (!text) return;
      var todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      todos.push({ text: text, done: false });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      input.value = '';
      renderTodos();
    });

    document.getElementById('logout-btn').addEventListener('click', function() {
      localStorage.removeItem('todo_email');
      localStorage.removeItem('todo_name');
      localStorage.removeItem('todo_token');
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    render();
  </script>
</body>
</html>
