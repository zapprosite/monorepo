<!DOCTYPE html>
<html>
<head><title>Autenticando...</title></head>
<body>
<p>Autenticando com Google...</p>
<script src="env.js"></script>
<script>
(function() {
  var CONFIG = window.__ENV__ || {};
  var TOKEN_ENDPOINT = 'https://oauth2.googleapis.com/token';
  var USERINFO_ENDPOINT = 'https://www.googleapis.com/oauth2/v2/userinfo';

  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var error = params.get('error');

  if (error) {
    document.body.innerHTML = '<p style="color:red">Erro: ' + error + '</p><a href="/">Voltar</a>';
    return;
  }

  if (!code) {
    document.body.innerHTML = '<p>Codigo nao encontrado. <a href="/">Voltar</a></p>';
    return;
  }

  var verifier = sessionStorage.getItem('pkce_verifier');

  var body = 'code=' + encodeURIComponent(code) +
    '&client_id=' + encodeURIComponent(CONFIG.GOOGLE_CLIENT_ID || '') +
    '&client_secret=' + encodeURIComponent(CONFIG.GOOGLE_CLIENT_SECRET || '') +
    '&redirect_uri=' + encodeURIComponent(CONFIG.GOOGLE_REDIRECT_URI || 'https://todo.zappro.site/auth/callback') +
    '&grant_type=authorization_code' +
    '&code_verifier=' + encodeURIComponent(verifier);

  var xhr = new XMLHttpRequest();
  xhr.open('POST', TOKEN_ENDPOINT, true);
  xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      if (data.access_token) {
        localStorage.setItem('todo_token', data.access_token);
        if (data.refresh_token) {
          localStorage.setItem('todo_refresh', data.refresh_token);
        }
        var userXhr = new XMLHttpRequest();
        userXhr.open('GET', USERINFO_ENDPOINT, true);
        userXhr.setRequestHeader('Authorization', 'Bearer ' + data.access_token);
        userXhr.onload = function() {
          try {
            var user = JSON.parse(userXhr.responseText);
            localStorage.setItem('todo_email', user.email || '');
            localStorage.setItem('todo_name', user.name || '');
          } catch(e) {}
          window.location.href = '/';
        };
        userXhr.onerror = function() { window.location.href = '/'; };
        userXhr.send();
      } else {
        document.body.innerHTML = '<p style="color:red">Token error: ' + (data.error || 'unknown') + '</p><a href="/">Voltar</a>';
      }
    } catch(e) {
      document.body.innerHTML = '<p style="color:red">Parse error</p><a href="/">Voltar</a>';
    }
  };
  xhr.onerror = function() {
    document.body.innerHTML = '<p style="color:red">Network error</p><a href="/">Voltar</a>';
  };
  xhr.send(body);
})();
</script>
</body>
</html>
