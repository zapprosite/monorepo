services:
  hermes-agency:
    build:
      context: /srv/monorepo
      dockerfile: apps/hermes-agency/Dockerfile
    container_name: hermes-agency
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - /srv/monorepo/.env
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://aurelia-qdrant-1:6333
      - REDIS_URL=redis://:Fifine156458*@aurelia-redis-1:6379
      - REDIS_HOST=aurelia-redis-1
      - OLLAMA_URL=http://host.docker.internal:11434
      - STT_DIRECT_URL=http://host.docker.internal:8204
      - TTS_BRIDGE_URL=http://host.docker.internal:8012
      - HERMES_GATEWAY_URL=http://host.docker.internal:8642
      - HERMES_AGENCY_WEBHOOK_URL=
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aurelia_default
      - aurelia-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  aurelia_default:
    external: true
  aurelia-net:
    external: true
