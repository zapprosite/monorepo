# budget.yml — LLM Budget Configuration for Orchestrator Pipelines
# Part of: SPEC-071-V6 (COST ENGINE)
# Source of truth for cost limits and model fallback chain
# All costs in USD

# Default budget per pipeline run (USD)
# Pipelines exceeding this will trigger model fallback
default_budget_per_pipeline: 0.50

# Maximum tokens per model (agent-level limits)
# Prevents runaway token usage on expensive models
max_tokens_per_agent:
  o1-preview: 100000
  o1-mini: 50000
  gpt-4o: 200000
  gpt-4o-mini: 500000
  claude-3-haiku: 200000
  # Local/free models: effectively unlimited
  gemma4-12b-it: 1000000
  llama3-portuguese-tomcat-8b: 1000000
  minimax-m2.7: 1000000

# Model fallback chain — tried in order when budget or limits exceeded
# More expensive first, cheaper (or local) last
model_fallback:
  - o1-preview
  - o1-mini
  - gpt-4o
  - gpt-4o-mini
  - claude-3-haiku
  - gemma4-12b-it
  - llama3-portuguese-tomcat-8b
  - minimax-m2.7

# Alert threshold — warn when this fraction of budget is used (0.0–1.0)
# 0.80 = warn at 80% of budget
alert_threshold: 0.80

# Cost tracking file (auto-managed by track_cost.sh)
# Do not edit manually
# cost_tracking_file: .orchestrator/cost-tracking.json

# Model cost table (USD per 1M tokens) — OpenAI API reference (April 2026)
# Local models (Gemma4, llama3, MiniMax) are free
model_costs:
  # Model: [input_cost_per_1M, output_cost_per_1M]
  o1-preview: [15.00, 60.00]
  o1-mini: [3.00, 12.00]
  gpt-4o: [2.50, 10.00]
  gpt-4o-mini: [0.15, 0.60]
  claude-3-haiku: [0.25, 1.25]
  # Local models — zero cost
  gemma4-12b-it: [0.00, 0.00]
  llama3-portuguese-tomcat-8b: [0.00, 0.00]
  minimax-m2.7: [0.00, 0.00]

# Pipeline-specific overrides (optional)
# Uncomment and customize per pipeline
# pipeline_overrides:
#   SPEC-071:
#     budget: 1.00
#     model_fallback:
