# ============================================================
# SPEC-040 Rate Limiting — limit_req_zone definitions
# nginx reverse proxy rate limiting zones
# Created: 2026-04-14
# Source: docs/SPECS/SPEC-040-homelab-alerting-rate-limit.md
# ============================================================

# Ollama — 60 req/min (context-length bounded by VRAM)
# VRAM budget: 14GB reserved for Qwen2.5 7B, max 2 concurrent
limit_req_zone $binary_remote_addr zone=ollama:10m rate=60r/m;

# OpenWebUI — 30 req/min (human users, not bots)
# Note: OpenWebUI currently not exposed; reserved for future :3010
limit_req_zone $binary_remote_addr zone=openwebui:10m rate=30r/m;

# LiteLLM Proxy — 90 req/min (proxy aggregate, multiple backends)
# VRAM budget: 4GB, max 4 concurrent
limit_req_zone $binary_remote_addr zone=litellm:10m rate=90r/m;

# n8n Webhooks — 120 req/min (high for webhook bursts)
# Leaky bucket equivalent via burst=20
limit_req_zone $binary_remote_addr zone=n8n:10m rate=120r/m;

# Hermes Agent — 20 req/min (Telegram polling, low volume)
# Token bucket: 20 req/min, burst=3 for message spikes
limit_req_zone $binary_remote_addr zone=hermes:10m rate=20r/m;
