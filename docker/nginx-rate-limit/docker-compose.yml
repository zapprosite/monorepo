# ============================================================
# SPEC-040 Rate Limiting — nginx upstream containers
# nginx reverse proxies for rate-limited access to AI services
# Created: 2026-04-14
# ============================================================

services:
  # Rate-limited LiteLLM proxy on :4010
  # Upstream: zappro-litellm at localhost:4000 (host network)
  nginx-ratelimit-litellm:
    image: nginx:alpine
    container_name: nginx-ratelimit-litellm
    network_mode: host
    volumes:
      - ./nginx-ratelimit-litellm.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Rate-limited Ollama on :11435
  # Upstream: ollama at localhost:11434 (host network)
  nginx-ratelimit-ollama:
    image: nginx:alpine
    container_name: nginx-ratelimit-ollama
    network_mode: host
    volumes:
      - ./nginx-ratelimit-ollama.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:11435/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Rate-limited Hermes Gateway on :8643
  # Upstream: hermes-gateway at localhost:8642 (host network)
  nginx-ratelimit-hermes:
    image: nginx:alpine
    container_name: nginx-ratelimit-hermes
    network_mode: host
    volumes:
      - ./nginx-ratelimit-hermes.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8643/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks: {}