# ============================================================
# nginx reverse proxy: rate-limited LiteLLM access
# Upstream: zappro-litellm at localhost:4000
# nginx listens on :4010 (avoids conflict with Perplexity Agent :4004)
# Rate limit: 90 req/min, burst=15 nodelay
# Created: 2026-04-14
# ============================================================

events {
    worker_connections 1024;
}

http {
    # Rate limit status code (429 instead of default 503)
    limit_req_status 429;

    # Rate limit zones (must match rate-limit.conf)
    limit_req_zone $binary_remote_addr zone=ollama:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=openwebui:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=litellm:10m rate=90r/m;
    limit_req_zone $binary_remote_addr zone=n8n:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=hermes:10m rate=20r/m;

    server {
        listen 4010;
        server_name localhost;

        # LiteLLM proxy — rate limited
        location / {
            limit_req zone=litellm burst=15 nodelay;
            proxy_pass http://127.0.0.1:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health check endpoint — static 200 (upstream /health requires auth)
        location = /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # OpenAI-compatible endpoints — same limit
        location /v1/ {
            limit_req zone=litellm burst=15 nodelay;
            proxy_pass http://127.0.0.1:4000/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
