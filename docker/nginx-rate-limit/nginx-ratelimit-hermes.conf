# ============================================================
# nginx reverse proxy: rate-limited Hermes Gateway access
# Upstream: hermes-gateway at localhost:8642
# nginx listens on :8643 (avoid conflict with hermes :8642)
# Rate limit: 20 req/min, burst=3 nodelay
# Created: 2026-04-14
# ============================================================

events {
    worker_connections 1024;
}

http {
    # Rate limit status code (429 instead of default 503)
    limit_req_status 429;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=ollama:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=openwebui:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=litellm:10m rate=90r/m;
    limit_req_zone $binary_remote_addr zone=n8n:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=hermes:10m rate=20r/m;

    server {
        listen 8643;
        server_name localhost;

        location / {
            limit_req zone=hermes burst=3 nodelay;
            proxy_pass http://127.0.0.1:8642;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health — no limit
        location /health {
            proxy_pass http://127.0.0.1:8642/health;
            proxy_set_header Host $host;
        }
    }
}
