x-common-env: &common-env
  COMPOSE_PROJECT_NAME: openwebui

services:
  openwebui:
    image: openwebui/open-webui:latest
    container_name: openwebui-hvac
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=3456
      - WEBUI_AUTH=false
      - DEFAULT_MODEL=minimax-m2.7
      - DEFAULT_MODELS=minimax-m2.7
      - DEFAULT_PINNED_MODELS=minimax-m2.7
      - TASK_MODEL=minimax-m2.7
      - TASK_MODEL_EXTERNAL=
      - OPENAI_API_BASE_URL=http://10.0.3.3:4000/v1
      - API_KEY=sk-zappro-lm-2026-s8k3m9x2p7r6t5w1v4c8n0d5j7f9g3h6i2k4l6m8n0p1
    volumes:
      - /srv/data/openwebui:/app/backend/data:rw
    networks:
      - zappro-lite_default
    ports:
      - "3456:3456"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  zappro-lite_default:
    external: true