services:
  openwebui-hvac:
    image: openwebui/open-webui@sha256:c2e4723fdbca5de8f9f0529e22b78acf5bc312a88da730bed88860063d028fe8
    container_name: openwebui-hvac
    restart: unless-stopped
    env_file: /srv/monorepo/.env
    environment:
      - HOST=0.0.0.0
      - PORT=3456
      # CRITICAL: Use 4 slashes for absolute path in SQLite URL
      - DATABASE_URL=sqlite:////app/backend/data/webui.db
      # Redis — use trieve-redis IP directly (host networking can't resolve Docker DNS)
      - REDIS_HOST=10.0.8.5
      - REDIS_PORT=6379
      # HVAC Pipe — OpenAI-compatible backend at port 4017 (on host)
      - OPENAI_API_BASE_URL=http://localhost:4017/v1
      - OPENAI_API_KEY=sk-local-zappro-clima
      # Expose ONLY zappro-clima-tutor model
      - DEFAULT_MODELS=zappro-clima-tutor
      - DEFAULT_PINNED_MODELS=zappro-clima-tutor
      - TASK_MODEL_EXTERNAL=zappro-clima-tutor
      # Disable Ollama to prevent other models from being exposed
      - ENABLE_OLLAMA_API=false
      # TTS Configuration — Edge TTS at 10.0.1.2:5050 (host networking uses IPs)
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://10.0.1.2:5050/v1
      - AUDIO_TTS_OPENAI_API_KEY=not-needed
      - AUDIO_TTS_MODEL=tts-1
      - AUDIO_TTS_VOICE=pt-BR-FranciscaNeural
      - AUDIO_TTS_SPLIT_ON=punctuation
    network_mode: host
    volumes:
      - monorepo_openwebui-data:/app/backend/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  monorepo_openwebui-data:
    external: true
    name: monorepo_openwebui-data
