x-common-env: &common-env
  COMPOSE_PROJECT_NAME: openwebui

services:
  openwebui:
    image: openwebui/open-webui:latest
    container_name: openwebui-hvac
    restart: unless-stopped
    env_file:
      - /srv/monorepo/.env
    environment:
      - HOST=0.0.0.0
      - PORT=3456
      - WEBUI_AUTH=true
      - ENABLE_API_KEYS=true
      - DEFAULT_MODEL=zappro-clima-tutor
      - DEFAULT_MODELS=zappro-clima-tutor
      - DEFAULT_PINNED_MODELS=zappro-clima-tutor
      - TASK_MODEL=zappro-clima-tutor
      - TASK_MODEL_EXTERNAL=
      - OPENAI_API_BASE_URL=http://host.docker.internal:4017/v1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ENABLE_OAUTH_SIGNUP=true
    volumes:
      - /srv/data/openwebui:/app/backend/data:rw
    networks:
      - zappro-lite_default
    ports:
      - "3456:3456"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  zappro-lite_default:
    external: true