services:
  openai-edge-tts:
    image: travisvn/openai-edge-tts:latest
    container_name: openai-edge-tts
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5050"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zappro-tts

networks:
  zappro-tts:
    name: zappro-tts
