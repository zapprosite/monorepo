services:
  openai-edge-tts:
    image: edge-tts-edge-tts:dev-20260503  # SPEC-210: local build, ID sha256:5e65be60146b9a7bf35520697199be69b1e0b46fb64b374796b8af21a08cbb8f
    container_name: openai-edge-tts
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5050"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zappro-tts

networks:
  zappro-tts:
    name: zappro-tts
