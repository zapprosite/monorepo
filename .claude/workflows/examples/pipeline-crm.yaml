# CRM Refrimix Pipeline - Universal Orchestrator Example
name: crm-pipeline
description: CRM Refrimix pipeline with human approval gates
version: 1.0.0

triggers:
  - type: manual
  - type: webhook
    event: crm.slice.requested

variables:
  targetModule: "{{event.payload.module}}"

phases:
  - name: fase1_crm_core
    steps:
      - agent:
          role: auditor
          task: audit_crm_core
          context:
            modules: ["leads", "clients", "reminders"]

      - agent:
          role: builder
          task: fix_crm_issues
          context:
            issues: "{{context.fase1_audit.issues}}"

    approval_gate:
      id: approve_fase1
      type: approval
      approvers:
        - role: tech-lead
      prompt: |
        Aprovar FASE 1 - CRM Core?
        Issues encontrados: {{context.fase1_audit.total}}
        P1: {{context.fase1_audit.p1_count}}, P2: {{context.fase1_audit.p2_count}}
      timeout: 86400

  - name: fase2_field_ops
    condition: "gate.approve_fase1.approved == true"
    steps:
      - agent:
          role: auditor
          task: audit_field_ops
          context:
            modules: ["schedule", "service-orders", "kanban", "contracts"]

      - agent:
          role: builder
          task: fix_field_ops_issues

    approval_gate:
      id: approve_fase2
      type: approval
      approvers:
        - role: tech-lead
      prompt: Aprovar FASE 2 - Field Ops?
      timeout: 86400

  - name: fase3_marketing
    condition: "gate.approve_fase2.approved == true"
    steps:
      - agent:
          role: auditor
          task: audit_marketing_integrations
          context:
            modules: ["editorial", "webhooks", "mcp"]

      - agent:
          role: builder
          task: fix_marketing_issues

  - name: publish
    condition: "gate.approve_fase2.approved == true"
    steps:
      - webhook:
          url: "{{config.webhooks.pipelineCompleted}}"
          payload:
            pipeline: crm-refrimix
            fases: 3
            timestamp: "{{workflow.completedAt}}"

on_failure:
  phase: notify
  steps:
    - webhook:
        url: "{{config.webhooks.pipelineError}}"
        payload:
          pipeline: crm-refrimix
          error: "{{workflow.lastError}}"
