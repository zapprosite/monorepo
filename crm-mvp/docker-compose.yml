services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_DB: crm_mvp
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    # SECURITY: Postgres is NOT exposed on host. API connects via Docker network.
    # If you need external access, use: docker exec -it crm-postgres psql -U crm -d crm_mvp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_mvp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    # Port not exposed on host — using existing Redis or internal network only
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: crm-api
    environment:
      NODE_ENV: production
      API_PORT: 4088
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: crm
      DB_PASSWORD: crm
      DB_NAME: crm_mvp
      REDIS_URL: redis://redis:6379
      WEB_URL: http://localhost:3080
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-zappro.ia@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Fifine156458*}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4088:4088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: node:22-alpine
    container_name: crm-web
    working_dir: /app/apps/web
    volumes:
      - .:/app
    command: ["npx", "vite", "--port", "3080", "--host"]
    environment:
      VITE_API_URL: http://api:4088
    ports:
      - "3080:3080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
