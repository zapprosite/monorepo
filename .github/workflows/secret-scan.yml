name: Secret Scanning

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Detect Secrets in Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3

      - name: Report
        if: always()
        run: |
          echo "Secret scan completed"
          echo "If secrets were found, the PR will be blocked from merging"
