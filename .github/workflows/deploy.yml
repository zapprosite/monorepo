name: Deploy

# Deploy to Coolify on merge to main.
# Stage 1: Build & Test (always runs, no gate)
# Stage 2: Human approval (via GitHub Environment protection rules)
# Stage 3: Deploy to Coolify + smoke test + rollback on failure
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - preview

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  HEALTH_TIMEOUT: 90
  HEALTH_INTERVAL: 10
  COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
  COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1: Build & Test — always runs, no human gate
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: connected_repo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: connected_repo_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare .env for CI
        run: |
          cp .env.example .env 2>/dev/null || true
          sed -i 's|SESSION_SECRET=.*|SESSION_SECRET=ci-placeholder|g' .env 2>/dev/null || true
          sed -i 's|INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=ci-placeholder|g' .env 2>/dev/null || true
          sed -i 's|DB_NAME=connected_repo$|DB_NAME=connected_repo_test|g' .env 2>/dev/null || true
          for app in apps/api apps/web apps/backend apps/frontend 2>/dev/null; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - name: Type check
        run: pnpm check-types

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build
        run: pnpm turbo build
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Test
        run: pnpm turbo test
        env:
          TURBO_CACHE_DIR: .turbo

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2: Human Gate — GitHub Environment protection rule
  # ─────────────────────────────────────────────────────────────────────────
  human-gate:
    name: Human Approval Gate
    runs-on: ubuntu-latest
    needs: [build-and-test]
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://web.zappro.site
    # The environment protection rule in GitHub Settings > Environments
    # requires an reviewer to approve before deploy job can run.
    steps:
      - name: Gate — awaiting human approval
        run: |
          echo "=== Human Approval Gate ==="
          echo "Environment: ${{ inputs.environment || 'production' }}"
          echo "Commit: ${{ github.sha }}"
          echo "Commit message: $(git log -1 --format='%s' ${{ github.sha }})"
          echo ""
          echo "Waiting for an authorized reviewer to approve this deployment..."
          echo "Approve at: https://github.com/${{ github.repository }}/environments/${{ inputs.environment || 'production' }}/protection"

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 3: Deploy — only runs after human gate is cleared
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [human-gate]
    environment: ${{ inputs.environment || 'production' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lookup APP UUID from Coolify
        id: lookup
        run: |
          echo "Fetching application list from Coolify..."
          APP_UUID=$(curl -s "$COOLIFY_URL/api/v1/applications" \
            -H "Authorization: Bearer $COOLIFY_API_KEY" \
            | python3 -c "
import sys,json
data=json.load(sys.stdin)
apps=data.get('data',[])
matches=[a for a in apps if 'monorepo' in a.get('name','').lower() or 'web' in a.get('name','').lower()]
if matches:
    print(matches[0]['uuid'])
else:
    print('NOT_FOUND')
" 2>/dev/null)

          if [[ "$APP_UUID" == "NOT_FOUND" ]]; then
            echo "ERROR: Could not find monorepo/web application in Coolify"
            echo "Available applications:"
            curl -s "$COOLIFY_URL/api/v1/applications" \
              -H "Authorization: Bearer $COOLIFY_API_KEY" \
              | python3 -c "import sys,json; data=json.load(sys.stdin); [print(f'  - {a.get(\"name\",\"\")} ({a.get(\"uuid\",\"\")})') for a in data.get('data',[])]"
            exit 1
          fi

          echo "App UUID: $APP_UUID"
          echo "app_uuid=$APP_UUID" >> $GITHUB_OUTPUT

      - name: Trigger Deploy on Coolify
        run: |
          echo "Triggering deploy for app: ${{ env.app_uuid }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}/deploy" \
            -H "Authorization: Bearer $COOLIFY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"pull_request_id\": \"main\", \"environment_name\": \"${{ inputs.environment || 'production' }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "201" ]]; then
            echo "ERROR: Deploy trigger failed (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            exit 1
          fi

          echo "Deploy triggered (HTTP $HTTP_CODE)"

      - name: Wait for Deploy to Complete
        run: |
          ELAPSED=0
          echo "Polling Coolify for deployment status..."
          while [[ $ELAPSED -lt $HEALTH_TIMEOUT ]]; do
            STATUS=$(curl -s "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}" \
              -H "Authorization: Bearer $COOLIFY_API_KEY" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "unknown")

            echo "[${ELAPSED}s] Status: $STATUS"

            case "$STATUS" in
              running|idle)
                echo "Deploy completed successfully!"
                exit 0
                ;;
              degraded|stopped)
                echo "WARNING: App is $STATUS — continuing to monitor..."
                ;;
              *)
                echo "Status: $STATUS — waiting..."
                ;;
            esac

            sleep $HEALTH_INTERVAL
            ELAPSED=$((ELAPSED + HEALTH_INTERVAL))
          done

          echo "ERROR: Deploy timeout after ${HEALTH_TIMEOUT}s"
          exit 1

      - name: Smoke Test
        run: |
          ELAPSED=0
          HEALTH_URL="https://web.zappro.site/_stcore/health"
          echo "Running smoke test against $HEALTH_URL..."
          while [[ $ELAPSED -lt $HEALTH_TIMEOUT ]]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Smoke Test PASSED (HTTP 200 after ${ELAPSED}s)"
              exit 0
            fi
            echo "[${ELAPSED}s] Health check: HTTP $HTTP_CODE"
            sleep $HEALTH_INTERVAL
            ELAPSED=$((ELAPSED + HEALTH_INTERVAL))
          done
          echo "Smoke Test FAILED — app did not become healthy"
          exit 1

      - name: Deployment Summary
        if: success()
        run: |
          echo "## Deploy: SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: \`${{ inputs.environment || 'production' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Coolify: $COOLIFY_URL" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 4: Rollback — triggered automatically on deploy failure
  # ─────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && needs.deploy.result == 'failure'
    environment: ${{ inputs.environment || 'production' }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Previous Deployment
        id: prev
        run: |
          DEPLOYMENTS=$(curl -s \
            "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}/deployments" \
            -H "Authorization: Bearer $COOLIFY_API_KEY")

          PREV_COMMIT=$(echo "$DEPLOYMENTS" | python3 -c "
import sys,json
data=json.load(sys.stdin)
deploys=data.get('data',[])
if len(deploys) > 1:
    print(deploys[1].get('commit','')[:8])
" 2>/dev/null || echo "")

          if [[ -z "$PREV_COMMIT" ]]; then
            echo "No previous deployment found — cannot rollback automatically"
            exit 1
          fi

          echo "Previous commit: $PREV_COMMIT"
          echo "prev_commit=$PREV_COMMIT" >> $GITHUB_OUTPUT

      - name: Trigger Rollback
        run: |
          echo "Rolling back to previous commit: ${{ env.prev_commit }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}/deploy" \
            -H "Authorization: Bearer $COOLIFY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commit\": \"${{ env.prev_commit }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]] && echo "Rollback triggered" || echo "Rollback failed (HTTP $HTTP_CODE)"

      - name: Rollback Summary
        run: |
          echo "## Rollback: TRIGGERED" >> $GITHUB_STEP_SUMMARY
          echo "- Rolling back to: \`${{ env.prev_commit }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Original commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
