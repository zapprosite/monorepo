name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: connected_repo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: connected_repo_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Preparar .env para CI
        run: |
          cp .env.example .env
          sed -i 's|SESSION_SECRET=.*|SESSION_SECRET=ci-session-secret-minimum-32-characters-ok!!|' .env
          sed -i 's|INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=ci-internal-api-secret-minimum-32-chars!!|' .env
          sed -i 's|DB_NAME=connected_repo$|DB_NAME=connected_repo_test|' .env
          cp apps/api/.env.example apps/api/.env 2>/dev/null || true
          cp apps/web/.env.example apps/web/.env 2>/dev/null || true

      - run: pnpm turbo build

      - run: pnpm turbo lint

      - run: pnpm turbo test

      - name: Update pipeline state
        if: success()
        run: echo "CI_PASSED=true" >> $GITHUB_STEP_SUMMARY
