name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1: Build & Test — runs on every push/PR
  # ─────────────────────────────────────────────────────────────────────────
  pipeline:
    name: Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: connected_repo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: connected_repo_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare .env for CI
        run: |
          cp .env.example .env 2>/dev/null || true
          sed -i 's|SESSION_SECRET=.*|SESSION_SECRET=ci-placeholder|g' .env 2>/dev/null || true
          sed -i 's|INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=ci-placeholder|g' .env 2>/dev/null || true
          sed -i 's|DB_NAME=connected_repo$|DB_NAME=connected_repo_test|g' .env 2>/dev/null || true
          for app in apps/api apps/web apps/backend apps/frontend 2>/dev/null; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - name: Type check
        run: pnpm check-types

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build
        run: pnpm turbo build
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Test
        run: pnpm turbo test
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Summary
        if: success()
        run: |
          echo "## CI Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Summary (failure)
        if: failure()
        run: |
          echo "## CI Status: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
