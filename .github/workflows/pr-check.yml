name: PR Check
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        # version auto-detected from packageManager field

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # TODO: Fix pnpm 9.0.6 worker crash - using pnpm 9 (non-exact)
      - name: Install dependencies
        env:
          PNPM_HOME: /home/runner/.pnpm
          PNPM_CONFIG_STORE_DIR: /home/runner/.pnpm/store
          PNPM_CONFIG_VIRTUAL_STORE_DIR: /home/runner/.pnpm/virtual
        run: pnpm install

      - name: Type check
        run: pnpm tsc --noEmit || npx tsc --noEmit

      - name: Lint
        run: pnpm lint || npx eslint .

      - name: Test
        run: pnpm test || echo "No tests configured"

      - name: Version drift check
        run: bash scripts/versions-check.sh
