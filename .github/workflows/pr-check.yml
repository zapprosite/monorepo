name: PR Check
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # TEMP: pnpm 9.0.6 worker crash bug - using npm as fallback
      # TODO: Revert to pnpm when bug is resolved
      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check-types || npx tsc --noEmit

      - name: Lint
        run: npm run lint || npx eslint .

      - name: Test
        run: npm test || echo "No tests configured"

      - name: Version drift check
        run: bash scripts/versions-check.sh
