name: PR Check
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        run: npm install -g pnpm@9.0.6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # TODO: Fix pnpm 9.0.6 worker crash - using pnpm 9 (non-exact)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test || echo "No tests configured"

      - name: Version drift check
        run: bash scripts/versions-check.sh
