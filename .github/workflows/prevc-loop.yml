name: PREVC Execution Loop

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID from queue'
        required: true
      task_command:
        description: 'Command to execute'
        required: true
      context_path:
        description: 'Path to context files (optional)'
        required: false
        default: ''

jobs:
  execute-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create ephemeral worktree
        id: worktree
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
        run: |
          WORKTREE_DIR="/tmp/nexus-$TASK_ID-$(date +%s)"
          git worktree add "$WORKTREE_DIR" HEAD || true
          echo "WORKTREE_DIR=$WORKTREE_DIR" >> $GITHUB_ENV
          echo "TASK_ID=$TASK_ID" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install dependencies
        env:
          WORKTREE_DIR: ${{ env.WORKTREE_DIR }}
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.WORKTREE_DIR }}

      - name: Execute task command
        env:
          TASK_CMD: ${{ github.event.inputs.task_command }}
          WORKTREE_DIR: ${{ env.WORKTREE_DIR }}
        run: |
          cd "$WORKTREE_DIR"
          eval "$TASK_CMD"
        continue-on-error: true
        id: execute

      - name: Run TypeScript check
        env:
          WORKTREE_DIR: ${{ env.WORKTREE_DIR }}
        run: pnpm tsc --noEmit
        continue-on-error: true
        working-directory: ${{ env.WORKTREE_DIR }}

      - name: Run lint
        env:
          WORKTREE_DIR: ${{ env.WORKTREE_DIR }}
        run: pnpm lint
        continue-on-error: true
        working-directory: ${{ env.WORKTREE_DIR }}

      - name: Run tests
        env:
          WORKTREE_DIR: ${{ env.WORKTREE_DIR }}
        run: pnpm test --run
        continue-on-error: true
        working-directory: ${{ env.WORKTREE_DIR }}

      - name: Report results
        env:
          TASK_ID: ${{ env.TASK_ID }}
        run: |
          echo "=== TASK RESULT ==="
          echo "TASK_ID=$TASK_ID"
          echo "WORKTREE=$WORKTREE_DIR"
          echo "STATUS=${{ job.status }}"

      - name: Cleanup worktree
        if: always()
        env:
          WORKTREE_DIR: ${{ env.WORKTREE_DIR }}
        run: |
          if [ -n "$WORKTREE_DIR" ]; then
            git worktree remove "$WORKTREE_DIR" --force 2>/dev/null || true
            rm -rf "$WORKTREE_DIR" 2>/dev/null || true
          fi

  merge-on-success:
    needs: execute-task
    if: needs.execute-task.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge changes
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
        run: |
          echo "Task $TASK_ID completed successfully"
