name: Deploy on Green

on:
  workflow_dispatch:
    environment: production
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  gate-one:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
      - name: Manual dispatch gate
        run: echo "Manual dispatch approved"

  gate-two:
    # Runs on workflow_run to enforce approval; workflow_dispatch bypasses via gate-one
    if: ${{ github.event_name == 'workflow_run' }}
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
      - name: CI success approval gate
        run: |
          echo "Waiting for manual approval before deploying after CI success..."
          echo "Please approve this run in the GitHub UI before proceeding."

  deploy:
    needs: [gate-one, gate-two]
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            "${COOLIFY_WEBHOOK_URL}" \
          && echo "Deploy triggered" \
          || echo "Deploy failed"
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
