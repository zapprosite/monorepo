name: Daily Report

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Report
        run: |
          echo "## Daily Report $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- Docs: $(find docs/ -name '*.md' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Specs: $(find docs/specflow/ -name 'SPEC-*.md' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- PRDs: $(find docs/specflow/ -name 'PRD-*.md' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Commands: $(ls .claude/commands/*.md | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Agents: $(ls .claude/agents/*.md | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Tasks pipeline: $(jq '.meta.totalTasks // 0' tasks/pipeline.json 2>/dev/null || echo 0)" >> $GITHUB_STEP_SUMMARY
