name: Code Quality

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.py'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  pull_request:
    branches: [main]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

      - name: Report success
        if: success()
        run: echo "type-check: passed" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Biome check
        run: pnpm biome:check || true

      - name: Report success
        if: success()
        run: echo "lint: passed" >> $GITHUB_STEP_SUMMARY

  telegram-report:
    name: Telegram Report
    needs: [type-check, lint]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TYPE_CHECK_RESULT: ${{ needs.type-check.conclusion }}
          LINT_RESULT: ${{ needs.lint.conclusion }}
        run: |
          TYPE_CHECK="$TYPE_CHECK_RESULT"
          LINT="$LINT_RESULT"

          if [[ "$TYPE_CHECK" == "success" ]] && [[ "$LINT" == "success" ]]; then
            MESSAGE="code-quality: all checks passed"
          else
            MESSAGE="code-quality: checks failed (type-check=$TYPE_CHECK lint=$LINT)"
          fi

          if [[ -n "$TELEGRAM_BOT_TOKEN" ]] && [[ -n "$TELEGRAM_CHAT_ID" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MESSAGE}&parse_mode=HTML" > /dev/null 2>&1 || true
          fi