# Authelia OIDC Provider for Trieve
# Authelia v5 — container internal, no host port binding

networks:
  crm-mvp_default:
    external: true
  zappro-infra:
    external: true

services:
  authelia:
    image: authelia/authelia:v5
    container_name: authelia
    restart: unless-stopped
    environment:
      - AUTHELIA_POSTGRES_PASSWORD=${TRIEVE_PG_PASSWORD:-uUnUZrdGFl7rCJqUFYeMMUW4vKNhbDJX}
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET:-change-me-in-production}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET:-change-me-in-production}
      - AUTHELIA_NOTIFIER_SMTP_HOST=smtp.gmail.com
      - AUTHELIA_NOTIFIER_SMTP_PORT=587
      - AUTHELIA_NOTIFIER_SMTP_USER=${SMTP_USER:-}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${SMTP_PASSWORD:-}
    volumes:
      - ./authelia:/config:ro
    networks:
      crm-mvp_default:
      zappro-infra:
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "monitor=prometheus"
      - "service=authelia"
