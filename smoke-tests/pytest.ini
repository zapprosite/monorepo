[pytest]
asyncio_mode = auto
testpaths = smoke-tests
python_files = smoke_hermes_telegram.py
python_classes = Test*
python_functions = test_*
markers =
    interactive: Teste que requer utilizador humano (CLI + App Telegram real)
    ci: Teste fully automated (mocked responses)
    cli: Teste CLI-only (sem Telegram App, Hermes local only)
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning
