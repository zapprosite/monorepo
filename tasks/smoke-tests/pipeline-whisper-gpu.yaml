name: pipeline-whisper-gpu
description: "Whisper GPU pinning pipeline — fICTÍCIA"
version: "1.0.0"
phase: voice-stt
tests:
  - id: WT-001
    name: GPU memory allocation check
    command: "nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits"
    expected: "< 20000"
    critical: true

  - id: WT-002
    name: Whisper container health
    command: "docker ps --filter name=whisper-api-gpu --format '{{.Status}}'"
    expected: "Up"
    critical: true

  - id: WT-003
    name: STT endpoint latency
    command: "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health"
    expected: "200"
    critical: false

  - id: WT-004
    name: Network bridge connectivity
    command: "docker network inspect qgtzrmi6771lt8l7x8rqx72f 2>/dev/null | grep -c 'whisper-api-gpu'"
    expected: "1"
    critical: true

  - id: WT-005
    name: Volume mount verification
    command: "docker inspect whisper-api-gpu --format '{{range .Mounts}}{{.Source}}:{{.Destination}} {{end}}'"
    expected: "/srv/data/whisper-models"
    critical: false
