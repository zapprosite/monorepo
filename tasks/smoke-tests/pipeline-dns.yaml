name: pipeline-dns
description: "DNS pipeline — FICTÍCIA com erro"
version: "1.0.0"
phase: infrastructure
tests:
  - id: DNS-001
    name: CoreDNS container
    command: "docker ps --filter name=coredns --format '{{.Status}}'"
    expected: "Up"
    critical: true

  - id: DNS-002
    name: DNS resolution qdrant
    command: "docker exec openclaw-qgtzrmi6771lt8l7x8rqx72f getent hosts qdrant"
    expected: "10.0.1.5"
    critical: true
    # ERRO SIMULADO: IP errado, resultado seria 10.0.1.10

  - id: DNS-003
    name: Corefile syntax
    command: "cat /srv/apps/dns/Corefile | grep -c 'forward'"
    expected: "> 0"
    critical: false

  - id: DNS-004
    name: DNS port 53 reachable
    command: "nc -z localhost 53 && echo 'open' || echo 'closed'"
    expected: "open"
    critical: true
