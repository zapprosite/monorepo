# Logrotate config for homelab-monorepo
# Place in /etc/logrotate.d/homelab-monorepo or run with: logrotate -f /srv/monorepo/scripts/logrotate.conf

/srv/monorepo/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 will will
    postrotate
        echo "Logrotate executed on $(date)" >> /srv/monorepo/logs/.rotate.log 2>/dev/null || true
    endscript
}

/srv/monorepo/logs/**/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 will will
}

/srv/ops/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}

/srv/ops/logs/**/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
}
