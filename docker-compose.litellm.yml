services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    env_file:
      - /srv/monorepo/.env
    environment:
      - LITELLM_CONFIG_FILE=/app/config/config.yaml
    volumes:
      - /srv/monorepo/config/litellm/config.yaml:/app/config/config.yaml:ro
      - /srv/monorepo/scripts/litellm-healthcheck.py:/app/healthcheck.py:ro
    ports:
      - "4018:4000"
    command: --config /app/config/config.yaml --port 4000 --num_workers 2
    healthcheck:
      test: ["CMD-SHELL", "python3 /app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monorepo_default
      - zappro-lite_default
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  monorepo_default:
    external: true
    name: monorepo_default
  zappro-lite_default:
    external: true
    name: zappro-lite_default
