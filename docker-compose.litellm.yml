services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    env_file:
      - /srv/monorepo/.env
    environment:
      - LITELLM_CONFIG_FILE=/app/config.yaml
    volumes:
      - /srv/monorepo/deployments/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4018:4000"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0", "--num_workers", "2"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:4000/', timeout=15); raise SystemExit(0 if r.status == 200 else 1)\""]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - monorepo_default
      - zappro-lite_default
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  monorepo_default:
    external: true
    name: monorepo_default
  zappro-lite_default:
    external: true
    name: zappro-lite_default
