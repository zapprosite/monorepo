# litellm_config_hermes_will.yaml
# LiteLLM Proxy: http://127.0.0.1:4018
# Ollama:        http://127.0.0.1:11434

model_list:
  # ==========================================================
  # LOCAL PRINCIPAL - CODE/TEXTO
  # ==========================================================
  - model_name: nexus-local-code
    litellm_params:
      model: openai/qwen3.6-coder
      api_base: os.environ/LLAMA_CPP_MAIN_URL
      api_key: sk-not-needed
      temperature: 0.1
      timeout: 300
    model_info:
      mode: chat
      description: "Local principal Llama.cpp: Qwen 3.6 Coder (VRAM optimized)"

  # ==========================================================
  # AUTO - PADRÃO DO HERMES
  # Local primeiro. OpenRouter só por fallback.
  # ==========================================================
  - model_name: nexus-auto
    litellm_params:
      model: openai/qwen3.6-coder
      api_base: os.environ/LLAMA_CPP_MAIN_URL
      api_key: sk-not-needed
      temperature: 0.1
      timeout: 300
    model_info:
      mode: chat
      description: "Alias padrão Nexus: rodando via Llama.cpp no VFS-tank"

  # ==========================================================
  # VISÃO LOCAL
  # ==========================================================
  - model_name: nexus-vision
    litellm_params:
      model: openai/qwen2.5vl
      api_base: os.environ/LLAMA_CPP_VISION_URL
      api_key: sk-not-needed
      temperature: 0.15
      timeout: 240
    model_info:
      mode: chat
      supports_vision: true
      description: "Visão local: Qwen2.5 VL via Llama.cpp (Port 8081)"

  # ==========================================================
  # EMBEDDING LOCAL - FIXADO/PINNED
  # ==========================================================
  - model_name: nexus-embed
    litellm_params:
      model: openai/nomic-embed-text
      api_base: os.environ/LLAMA_CPP_EMBED_URL
      api_key: sk-not-needed
      timeout: 180
    model_info:
      mode: embedding
      description: "Embedding Nomic rodando em CPU (llama.cpp -ngl 0) para liberar VRAM"

  # ==========================================================
  # EMBEDDING LOCAL - LATEST, APENAS BACKUP MANUAL
  # ==========================================================
  - model_name: nexus-embed-latest
    litellm_params:
      model: ollama/nomic-embed-text:latest
      api_base: os.environ/LITELLM_OLLAMA_URL
      timeout: 180
    model_info:
      mode: embedding
      description: "Embedding local latest, backup manual"

  # ==========================================================
  # OPENROUTER BARATO - PRIMEIRO FALLBACK CLOUD
  # ==========================================================
  - model_name: nexus-cloud-cheap
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.15
      timeout: 360
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-nexus-litellm"
    model_info:
      mode: chat
      description: "DeepSeek V4 Flash via OpenRouter: fallback barato para code/agente"

  # ==========================================================
  # OPENROUTER PRO - ESCALADA DE QUALIDADE
  # ==========================================================
  - model_name: nexus-cloud-pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.1
      timeout: 600
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-nexus-litellm"
    model_info:
      mode: chat
      description: "DeepSeek V4 Pro via OpenRouter: arquitetura, repo grande, refactor longo"

  # ==========================================================
  # OPENROUTER UI/MULTIMODAL
  # ==========================================================
  - model_name: nexus-cloud-ui
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.6
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.15
      timeout: 600
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-nexus-litellm"
    model_info:
      mode: chat
      supports_vision: true
      description: "Kimi K2.6 via OpenRouter: UI, multimodal e tarefas agentic especiais"

  # ==========================================================
  # BRAIN - ALIAS FORTE
  # ==========================================================
  - model_name: nexus-brain
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.1
      timeout: 600
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-nexus-litellm"
    model_info:
      mode: chat
      description: "Alias forte para PRD, arquitetura, repo grande e tarefas difíceis"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  fallbacks:
    - nexus-auto:
        - nexus-cloud-cheap
        - nexus-cloud-pro
    - nexus-local-code:
        - nexus-cloud-cheap
        - nexus-cloud-pro
    - nexus-vision:
        - nexus-cloud-ui
    - nexus-cloud-cheap:
        - nexus-cloud-pro

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 600
  enable_pre_call_checks: true
  allowed_fails: 3
  cooldown_time: 30
