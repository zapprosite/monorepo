# LiteLLM canonical config
# Primary local path: llama.cpp on :8001
# Embedding local path: llama.cpp CPU-only on :8002
# Ollama remains backup/manual only.

model_list:
  - model_name: hermes-code
    litellm_params:
      model: openai/qwen3.6-27b-code
      api_base: os.environ/LLAMA_CPP_MAIN_URL
      api_key: "sk-local"
      timeout: 300
      temperature: 0.1
    model_info:
      mode: chat
      input_cost_per_token: 0
      output_cost_per_token: 0
      description: "Canonical local code/chat path via llama.cpp on RTX 4090"

  - model_name: hermes-auto
    litellm_params:
      model: openai/qwen3.6-27b-code
      api_base: os.environ/LLAMA_CPP_MAIN_URL
      api_key: "sk-local"
      timeout: 300
      temperature: 0.1
    model_info:
      mode: chat
      input_cost_per_token: 0
      output_cost_per_token: 0
      description: "Default local-first router alias"

  - model_name: hermes-embed
    litellm_params:
      model: openai/nomic-embed-cpu
      api_base: http://172.17.0.1:8002/v1
      api_key: "EMPTY"
      timeout: 10
    model_info:
      mode: embedding
      input_cost_per_token: 0
      description: "Best-effort compatibility alias; critical path is direct llama.cpp"

  - model_name: hermes-embed-backup
    litellm_params:
      model: openai/nomic-embed-cpu
      api_base: http://host.docker.internal:8002/v1
      api_key: "EMPTY"
      timeout: 10
    model_info:
      mode: embedding
      input_cost_per_token: 0
      description: "Compatibility backup path to the same CPU-only llama.cpp embed server"

  - model_name: hermes-cloud-cheap
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 360
      temperature: 0.15
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-hermes-litellm"
    model_info:
      mode: chat
      description: "Cheap cloud fallback via OpenRouter"

  - model_name: hermes-cloud-pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 600
      temperature: 0.1
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-hermes-litellm"
    model_info:
      mode: chat
      description: "Higher-quality cloud fallback via OpenRouter"

  - model_name: hermes-resolver
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 600
      temperature: 0.1
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-hermes-litellm"
    model_info:
      mode: chat
      description: "Strategic resolver alias via OpenRouter"

  - model_name: nexus-local-code
    litellm_params:
      model: openai/qwen3.6-27b-code
      api_base: os.environ/LLAMA_CPP_MAIN_URL
      api_key: "sk-local"
      timeout: 300
      temperature: 0.1
    model_info:
      mode: chat
      input_cost_per_token: 0
      output_cost_per_token: 0
      description: "Compatibility alias for existing Nexus callers"

  - model_name: nexus-auto
    litellm_params:
      model: openai/qwen3.6-27b-code
      api_base: os.environ/LLAMA_CPP_MAIN_URL
      api_key: "sk-local"
      timeout: 300
      temperature: 0.1
    model_info:
      mode: chat
      input_cost_per_token: 0
      output_cost_per_token: 0
      description: "Compatibility default alias for existing Nexus callers"

  - model_name: nexus-embed
    litellm_params:
      model: openai/nomic-embed-cpu
      api_base: http://172.17.0.1:8002/v1
      api_key: "EMPTY"
      timeout: 10
    model_info:
      mode: embedding
      input_cost_per_token: 0
      description: "Deprecated legacy alias for existing Nexus embedding callers"

  - model_name: nexus-cloud-cheap
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 360
      temperature: 0.15
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-nexus-litellm"
    model_info:
      mode: chat
      description: "Compatibility cheap cloud alias"

  - model_name: nexus-cloud-pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 600
      temperature: 0.1
      extra_headers:
        HTTP-Referer: "http://localhost"
        X-Title: "will-nexus-litellm"
    model_info:
      mode: chat
      description: "Compatibility pro cloud alias"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 180
  num_retries: 1
  success_callback: []
  failure_callback: []

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 180
  fallbacks:
    - hermes-code:
        - hermes-cloud-cheap
        - hermes-cloud-pro
    - hermes-auto:
        - hermes-cloud-cheap
        - hermes-cloud-pro
    - hermes-resolver:
        - hermes-cloud-pro
    - nexus-local-code:
        - nexus-cloud-cheap
        - nexus-cloud-pro
    - nexus-auto:
        - nexus-cloud-cheap
        - nexus-cloud-pro
