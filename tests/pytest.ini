[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    e2e: marks end-to-end tests (deselect with '-m "not e2e"')
    slow: marks slow tests
    requires_stt: marks tests requiring STT service
    requires_llm: marks tests requiring LLM service
    requires_tts: marks tests requiring TTS service
addopts = -v --tb=short --strict-markers
