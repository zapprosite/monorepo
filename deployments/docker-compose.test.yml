# docker-compose.test.yml
# Smoke test suite for SPEC-007 deployment verification
# Run: docker compose -f deployments/docker-compose.test.yml up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_test_data:/data

  swarm:
    build: ..
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_ADDR=redis:6379
      - QDRANT_ADDR=qdrant:6333
      - ENVIRONMENT=test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - qdrant_test_data:/qdrant/storage

volumes:
  redis_test_data:
  qdrant_test_data:
