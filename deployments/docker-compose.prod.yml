services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - redis_data:/data
    networks:
      - swarm_net
    restart: "on-failure:3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - swarm_net
    restart: "on-failure:3"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  api:
    image: zappro/api:dev-20260503  # SPEC-210: local build, ID sha256:f775d6d36d2c9c3ac6fddc16e29aaef53219907c4a8757351566a8cd8ac2e927
    ports:
      - "4001:4001"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DB_HOST=${DB_HOST:-zappro-litellm-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-litellm}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-connected_repo_db}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - WEBAPP_URL=${WEBAPP_URL}
      - VITE_API_URL=${VITE_API_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_GRPC_URL=qdrant:6334
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - swarm_net
    restart: "on-failure:3"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "20"

  web:
    image: zappro/web:dev-20260503  # SPEC-210: local build, ID sha256:d7409e83eb7ac20de262d21fc647a923474564b7cb4562c212e06e56ad8ddd4a
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - swarm_net
    restart: "on-failure:3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  swarm_net:
    driver: bridge

volumes:
  redis_data:
  qdrant_data: