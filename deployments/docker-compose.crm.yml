services:
  crm-api:
    image: crm-api:local
    container_name: crm-api
    restart: unless-stopped
    env_file: /srv/monorepo/.env
    environment:
      NODE_ENV: production
      PORT: 4001
      DB_HOST: ${DB_HOST:-litellm-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-litellm}
      DB_PASSWORD: ${DB_PASSWORD:-uUnUZrdGFl7rCJqUFYeMMUW4vKNhbDJX}
      DB_NAME: ${DB_NAME:-connected_repo_db}
      SESSION_SECRET: ${SESSION_SECRET:-crm-prod-secret-min-32-chars-xyz}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-S8viXSauVSUtYYsTk+wXPE87D03l71/DQgASYOs6fLQ=}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_ORIGINS: https://crm.zappro.site,https://web.zappro.site
      WEBAPP_URL: https://crm.zappro.site
      API_BASE_URL: https://api.zappro.site
    ports:
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:4000:4001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - crm-network
      - zappro-lite_default

  crm-web:
    image: crm-web:local
    container_name: crm-web
    restart: unless-stopped
    environment:
      VITE_API_URL: https://api.zappro.site
      VITE_NODE_ENV: production
    ports:
      - "127.0.0.1:3080:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - crm-network
    depends_on:
      - crm-api

networks:
  crm-network:
    driver: bridge
  zappro-lite_default:
    external: true