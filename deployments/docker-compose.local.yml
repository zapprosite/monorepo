services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - redis_data:/data
    networks:
      - swarm_net
    restart: "on-failure:3"

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - swarm_net
    restart: "on-failure:3"

  swarm:
    build: ../Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - REDIS_ADDR=redis:6379
      - QDRANT_ADDR=qdrant:6334
      - SWARM_HTTP_PORT=:8080
      - SWARM_AGENTS_PATH=/app/config/agents.json
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:-}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID:-}
      - WHATSAPP_SECRET=${WHATSAPP_SECRET:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - TAILSCALE_AUTHKEY=${TAILSCALE_AUTHKEY:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - swarm_net
    restart: "on-failure:3"
    volumes:
      - ./config:/app/config:ro

networks:
  swarm_net:
    driver: bridge

volumes:
  redis_data:
  qdrant_data: