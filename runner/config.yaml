# Gitea Actions Runner config
log:
  level: info
  trace: false

runner:
  capacity: 1
  name: prod-runner-1
  labels:
    - self-hosted

cache:
  enabled: false

env:
  GITHUB_API_URL: http://127.0.0.1:3300/api/v1
  GITHUB_SERVER_URL: http://127.0.0.1:3300
  ACTIONS_RESULTS_URL: http://127.0.0.1:3300
  ACTIONS_RUNTIME_URL: http://127.0.0.1:3300/api/actions_pipeline/
