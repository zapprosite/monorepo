name: Secrets Audit

# Daily scan for hardcoded secrets and credentials.
# Runs on a schedule and can be triggered manually.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  secrets-scan:
    name: Scan for exposed secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm -v $(pwd):/code zricethezav/gitleaks:latest detect \
            --source /code \
            --verbose \
            --redact \
            --exit-code 1

      - name: Check for .env hardcoding
        run: |
          echo "Scanning for hardcoded secrets in source code..."
          # Look for common secret patterns in TS/JS files (excluding .env.example and test fixtures)
          grep -rEn \
            '(password|secret|token|key|api_key)\s*=\s*["\''][^${][^"\'']{8,}["\'']' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            . || true

          # Fail if any hardcoded values are found (excluding allowed patterns)
          COUNT=$(grep -rEn \
            '(password|secret|token|key|api_key)\s*=\s*["\''][^${][^"\'']{8,}["\'']' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            . | grep -v '// ok hardcoded for' | grep -v 'test' | grep -v '__mocks__' | wc -l || true)

          if [[ "$COUNT" -gt 0 ]]; then
            echo "ERROR: Found $COUNT potential hardcoded secrets in source code"
            exit 1
          fi

          echo "No hardcoded secrets detected"

      - name: Audit summary
        if: always()
        run: |
          echo "## Secrets Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
