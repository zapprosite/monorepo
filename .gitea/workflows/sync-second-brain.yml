name: Sync Second Brain

# Updates hermes-second-brain/monorepo-TREE.md via Gitea API
# Runs on push to main (after PR merge)
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'TREE.md'
      - '.gitignore'
      - 'LICENSE'
      - 'tasks/smoke-tests/**'

jobs:
  sync:
    name: Sync to Second Brain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate TREE.md content
        id: generate
        run: |
          REPO_DIR="${{ gitea.workspace }}"
          
          # Get list of tracked files (exclude large deps)
          find "$REPO_DIR" \
            -type f \
            -not -path "$REPO_DIR/.git/*" \
            -not -path "$REPO_DIR/node_modules/*" \
            -not -path "$REPO_DIR/.turbo/*" \
            -not -path "$REPO_DIR/dist/*" \
            -not -path "$REPO_DIR/.next/*" \
            -not -path "$REPO_DIR/.output/*" \
            -not -path "$REPO_DIR/__pycache__/*" \
            -not -path "$REPO_DIR/.venv/*" \
            -not -path "$REPO_DIR/venv/*" \
            -not -path "$REPO_DIR/.claude/cache/*" \
            -not -path "$REPO_DIR/.claude/tmp/*" \
            -not -name '*.lock' \
            -not -name 'pnpm-lock.yaml' \
            -not -name 'package-lock.json' \
            -not -name 'yarn.lock' \
            -not -name '.env' \
            -not -name '.env.*' \
            -not -name 'TREE.md' \
            | sed "s|$REPO_DIR/||" \
            | sort > /tmp/monorepo-files.txt

          # Generate TREE.md with hierarchy
          {
            echo "# Monorepo — TREE"
            echo ""
            echo "Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Commit: ${{ gitea.sha }}"
            echo ""
            echo "## Structure"
            echo ""
            while IFS= read -r line; do
              depth=$(echo "$line" | tr -cd '/' | wc -c)
              printf '%*s' $((depth * 2)) ''
              echo "- \`$line\`"
            done < /tmp/monorepo-files.txt
            echo ""
            echo "---"
            echo "*$(wc -l < /tmp/monorepo-files.txt) files tracked*"
          } > /tmp/tree-content.txt

          echo "tree_content<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/tree-content.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get current file SHA (if exists)
        id: sha
        run: |
          RESPONSE=$(curl -s -X GET \
            "http://gitea:3000/api/v1/repos/will-zappro/hermes-second-brain/contents/monorepo-TREE.md" \
            -H "Authorization: Bearer ${{ secrets.GITEA_TOKEN }}")
          
          SHA=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update monorepo-TREE.md via Gitea API
        run: |
          CONTENT=$(cat /tmp/tree-content.txt | base64 -w0)
          SHA="${{ steps.sha.outputs.sha }}"
          
          if [ -z "$SHA" ]; then
            # File doesn't exist — use POST (create)
            curl -s -X POST \
              "http://gitea:3000/api/v1/repos/will-zappro/hermes-second-brain/contents/monorepo-TREE.md" \
              -H "Authorization: Bearer ${{ secrets.GITEA_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"message\": \"chore: update monorepo TREE [skip ci]\",
                \"content\": \"$CONTENT\",
                \"branch\": \"main\"
              }"
          else
            # File exists — use PUT (update with SHA)
            curl -s -X PUT \
              "http://gitea:3000/api/v1/repos/will-zappro/hermes-second-brain/contents/monorepo-TREE.md" \
              -H "Authorization: Bearer ${{ secrets.GITEA_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"message\": \"chore: update monorepo TREE [skip ci]\",
                \"content\": \"$CONTENT\",
                \"sha\": \"$SHA\"
              }"
          fi
