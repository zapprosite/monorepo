name: Sync Second Brain

# Runs after PR merge to main — updates hermes-second-brain with new TREE.md
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'TREE.md'
      - '.gitignore'
      - 'LICENSE'

jobs:
  sync:
    name: Sync to Second Brain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Clone second-brain
        run: |
          git clone --depth 1 ssh://git@127.0.0.1:2222/will-zappro/hermes-second-brain.git /tmp/second-brain

      - name: Generate monorepo TREE.md
        run: |
          REPO_DIR="${{ gitea.workspace }}"
          cd /tmp/second-brain

          # Get list of tracked files in monorepo (exclude large deps)
          find "$REPO_DIR" \
            -type f \
            -not -path "$REPO_DIR/.git/*" \
            -not -path "$REPO_DIR/node_modules/*" \
            -not -path "$REPO_DIR/.turbo/*" \
            -not -path "$REPO_DIR/dist/*" \
            -not -path "$REPO_DIR/.next/*" \
            -not -path "$REPO_DIR/.output/*" \
            -not -path "$REPO_DIR/__pycache__/*" \
            -not -path "$REPO_DIR/.venv/*" \
            -not -path "$REPO_DIR/venv/*" \
            -not -path "$REPO_DIR/.claude/cache/*" \
            -not -path "$REPO_DIR/.claude/tmp/*" \
            -not -name '*.lock' \
            -not -name 'pnpm-lock.yaml' \
            -not -name 'package-lock.json' \
            -not -name 'yarn.lock' \
            -not -name '.env' \
            -not -name '.env.*' \
            -not -name 'TREE.md' \
            | sed "s|$REPO_DIR/||" \
            | sort > /tmp/monorepo-files.txt

          # Generate TREE.md with hierarchy
          {
            echo "# Monorepo — TREE"
            echo ""
            echo "Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Commit: ${{ gitea.sha }}"
            echo ""
            echo "## Structure"
            echo ""
            while IFS= read -r line; do
              depth=$(echo "$line" | tr -cd '/' | wc -c)
              printf '%*s' $((depth * 2)) ''
              echo "- \`$line\`"
            done < /tmp/monorepo-files.txt
            echo ""
            echo "---"
            echo "*$(wc -l < /tmp/monorepo-files.txt) files tracked*"
          } > /tmp/second-brain/monorepo-TREE.md

      - name: Check for changes
        id: changed
        run: |
          cd /tmp/second-brain
          if git diff --quiet monorepo-TREE.md 2>/dev/null; then
            echo "changed=false" >> $GITEA_OUTPUT
            echo "No changes to monorepo-TREE.md"
          else
            echo "changed=true" >> $GITEA_OUTPUT
          fi

      - name: Commit and push
        if: steps.changed.outputs.changed == 'true'
        run: |
          cd /tmp/second-brain
          git config user.email "hermes@zappro.ia"
          git config user.name "Hermes Agent"
          git add monorepo-TREE.md
          git commit -m "chore: update monorepo TREE [skip ci]"
          git push origin main
