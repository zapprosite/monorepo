name: CI Feature

# Lightweight CI for feature branches — no human gate needed.
# Runs on every push to a non-main branch (feature, fix, chore, etc.)
on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: ci-feature-${{ gitea.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DB_HOST: localhost
  DB_PORT: "5432"
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: connected_repo_test

jobs:
  ci-feature:
    name: Type Check · Lint · Build · Test · Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: connected_repo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Enable corepack / pnpm
        run: corepack enable && corepack prepare pnpm@9.0.6 --activate

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITEA_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ gitea.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --level high

      - name: Prepare .env for CI
        run: |
          cp .env.example .env
          sed -i 's|SESSION_SECRET=.*|SESSION_SECRET=ci-session-secret-minimum-32-characters-ok!!|' .env
          sed -i 's|INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=ci-internal-api-secret-minimum-32-chars!!|' .env
          sed -i 's|GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=ci-test.apps.googleusercontent.com|' .env
          sed -i 's|GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=ci-google-secret|' .env
          sed -i 's|DB_NAME=connected_repo$|DB_NAME=connected_repo_test|' .env
          cp apps/api/.env.example apps/api/.env 2>/dev/null || true
          cp apps/web/.env.example apps/web/.env 2>/dev/null || true

      - name: Sync env (workspace .env files)
        run: node scripts/sync-env.js

      - name: Type check
        run: pnpm check-types

      - name: Lint (Biome)
        run: pnpm biome check .

      - name: Build
        run: pnpm build
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Test with coverage
        run: pnpm test
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ gitea.sha }}
          path: |
            apps/api/coverage/
            apps/web/coverage/
            apps/ai-gateway/coverage/
            packages/zod-schemas/coverage/
          retention-days: 7

      - name: Post CI summary
        if: always()
        run: |
          echo "## CI Feature Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ gitea.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ gitea.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
