name: Deploy Main

# Deploy to Coolify on merge to main.
# Includes a human gate (environment approval) before the deploy step runs.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - preview

env:
  HEALTH_TIMEOUT: 90
  HEALTH_INTERVAL: 10

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1: Build & Test — always runs, no human gate
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: connected_repo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: connected_repo_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ gitea.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare .env for CI
        run: |
          cp .env.example .env
          sed -i 's|SESSION_SECRET=.*|SESSION_SECRET=ci-session-secret-minimum-32-characters-ok!!|' .env
          sed -i 's|INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=ci-internal-api-secret-minimum-32-chars!!|' .env
          sed -i 's|GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=ci-test.apps.googleusercontent.com|' .env
          sed -i 's|GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=ci-google-secret|' .env
          sed -i 's|DB_NAME=connected_repo$|DB_NAME=connected_repo_test|' .env
          cp apps/backend/.env.example apps/backend/.env
          cp apps/frontend/.env.example apps/frontend/.env

      - name: Sync env (workspace .env files)
        run: node scripts/sync-env.js

      - name: Type check
        run: yarn check-types

      - name: Lint (Biome)
        run: npx biome check .

      - name: Build
        run: yarn build
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Test
        run: yarn test
        env:
          TURBO_CACHE_DIR: .turbo

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2: Human Gate — must be approved in Gitea before deploy
  # ─────────────────────────────────────────────────────────────────────────
  human-gate:
    name: Human Approval Gate
    runs-on: ubuntu-latest
    needs: [build-and-test]
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://web.zappro.site
    # This job always passes; the gate is enforced by the Gitea environment
    # protection rule. An approver must visit the environment URL and click
    # "Approve" in the Gitea Actions UI before the deploy job can start.
    steps:
      - name: Gate — awaiting human approval
        run: |
          echo "=== Human Approval Gate ==="
          echo "Environment: ${{ inputs.environment || 'production' }}"
          echo "Commit: ${{ gitea.sha }}"
          echo "Commit message: $(git log -1 --format='%s' ${{ gitea.sha }})"
          echo ""
          echo "Waiting for an authorized reviewer to approve this deployment..."
          echo "Approve at: https://git.zappro.site/${{ gitea.repository }}/actions/environments"

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 3: Deploy — only runs after human gate is cleared
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [human-gate]
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get APP UUID from Coolify
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          echo "Fetching application list from Coolify..."
          APP_UUID=$(curl -s "$COOLIFY_URL/api/v1/applications" \
            -H "Authorization: Bearer $COOLIFY_API_KEY" | \
            python3 -c "import sys,json; data=json.load(sys.stdin); apps=data.get('data',[]); [print(a['uuid']) for a in apps if 'monorepo' in a.get('name','').lower() or 'web' in a.get('name','').lower()]" 2>/dev/null | head -1)

          if [[ -z "$APP_UUID" ]]; then
            echo "ERROR: Could not find application UUID in Coolify"
            echo "Available applications:"
            curl -s "$COOLIFY_URL/api/v1/applications" \
              -H "Authorization: Bearer $COOLIFY_API_KEY" | \
              python3 -c "import sys,json; data=json.load(sys.stdin); [print(f\"  - {a.get('name','')} ({a.get('uuid','')})\") for a in data.get('data',[])]"
            exit 1
          fi

          echo "App UUID: $APP_UUID"
          echo "app_uuid=$APP_UUID" >> $GITHUB_OUTPUT || echo "app_uuid=$APP_UUID" >> $GITEA_OUTPUT

      - name: Trigger Deploy on Coolify
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}/deploy" \
            -H "Authorization: Bearer $COOLIFY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"pull_request_id\": \"main\", \"environment_name\": \"${{ inputs.environment || 'production' }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "201" ]]; then
            echo "ERROR: Deploy trigger failed (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            exit 1
          fi

          echo "Deploy triggered successfully (HTTP $HTTP_CODE)"

      - name: Wait for Deploy to Complete
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          ELAPSED=0
          echo "Polling Coolify for deployment status..."
          while [[ $ELAPSED -lt $HEALTH_TIMEOUT ]]; do
            STATUS=$(curl -s "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}" \
              -H "Authorization: Bearer $COOLIFY_API_KEY" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "unknown")

            echo "[${ELAPSED}s] Deployment status: $STATUS"

            case "$STATUS" in
              running|idle)
                echo "Deploy completed successfully!"
                exit 0
                ;;
              degraded|stopped)
                echo "WARNING: App is $STATUS — continuing to monitor..."
                ;;
              *)
                echo "Status: $STATUS — waiting..."
                ;;
            esac

            sleep $HEALTH_INTERVAL
            ELAPSED=$((ELAPSED + HEALTH_INTERVAL))
          done

          echo "ERROR: Deploy timeout after ${HEALTH_TIMEOUT}s"
          exit 1

      - name: Smoke Test
        env:
          HEALTH_URL: https://web.zappro.site/_stcore/health
        run: |
          ELAPSED=0
          echo "Running smoke test against $HEALTH_URL..."
          while [[ $ELAPSED -lt $HEALTH_TIMEOUT ]]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Smoke Test PASSED (HTTP 200 after ${ELAPSED}s)"
              exit 0
            fi
            echo "[${ELAPSED}s] Health check: HTTP $HTTP_CODE"
            sleep $HEALTH_INTERVAL
            ELAPSED=$((ELAPSED + HEALTH_INTERVAL))
          done
          echo "Smoke Test FAILED — app did not become healthy"
          exit 1

      - name: Rollback on Failure
        if: failure()
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          echo "=== ROLLBACK: Deployment failed — rolling back to previous version ==="

          DEPLOYMENTS=$(curl -s \
            "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}/deployments" \
            -H "Authorization: Bearer $COOLIFY_API_KEY")

          # Get the previous deployment's commit hash
          PREV_COMMIT=$(echo "$DEPLOYMENTS" | python3 -c "
import sys,json
data=json.load(sys.stdin)
deploys=data.get('data',[])
if len(deploys) > 1:
    print(deploys[1].get('commit','')[:8])
" 2>/dev/null || echo "")

          if [[ -n "$PREV_COMMIT" ]]; then
            echo "Rolling back to previous commit: $PREV_COMMIT"
            RESPONSE=$(curl -s -w \"\n%{http_code}\" -X POST \
              "$COOLIFY_URL/api/v1/applications/${{ env.app_uuid }}/deploy" \
              -H "Authorization: Bearer $COOLIFY_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"commit\": \"$PREV_COMMIT\"}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "201" ]] && echo "Rollback triggered successfully" || echo "Rollback failed"
          else
            echo "No previous deployment found — cannot rollback automatically"
            exit 1
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "=== Deployment Summary ==="
          echo "Commit: ${{ gitea.sha }}"
          echo "Environment: ${{ inputs.environment || 'production' }}"
          echo "Result: ${{ job.status }}"
          echo "Logs: https://git.zappro.site/${{ gitea.repository }}/actions/runs/${{ gitea.run_id }}"
