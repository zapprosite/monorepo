name: Sync Second Brain

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync to hermes-second-brain
        run: |
          if [ -f "/srv/ops/scripts/sync-second-brain.sh" ]; then
            bash /srv/ops/scripts/sync-second-brain.sh
          fi
        env:
          REPO_NAME: crm-mvp
