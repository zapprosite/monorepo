name: Tests

on:
  push:
    branches:
      - 'feature/**'
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: act-node22:latest
    name: Unit Tests

    env:
      GITHUB_SERVER_URL: http://127.0.0.1:3300
      GITHUB_API_URL: http://127.0.0.1:3300/api/v1

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.email "hermes@zappro.site"
          git config --global user.name "Hermes Agent"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo typecheck

      - name: Run unit tests
        run: pnpm turbo test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            apps/*/coverage/
            packages/*/coverage/
          retention-days: 30
