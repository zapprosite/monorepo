name: Tests

on:
  push:
    branches:
      - 'feature/**'
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - name: Checkout monorepo (git clone)
        run: |
          git clone --depth=1 http://localhost:3300/will-zappro/monorepo.git .
          git fetch --depth=1 origin main

      - name: Configure Git
        run: |
          git config --global user.email "hermes@zappro.site"
          git config --global user.name "Hermes Agent"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm turbo test
