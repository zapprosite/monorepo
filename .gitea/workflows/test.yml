name: Tests

on:
  push:
    branches:
      - 'feature/**'
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - name: Checkout monorepo
        run: |
          /usr/bin/git clone --depth=1 http://localhost:3300/will-zappro/monorepo.git .
          /usr/bin/git fetch --depth=1 origin main

      - name: Configure Git
        run: |
          /usr/bin/git config --global user.email "hermes@zappro.site"
          /usr/bin/git config --global user.name "Hermes Agent"

      - name: Install dependencies
        run: /usr/local/bin/pnpm install --frozen-lockfile

      - name: Run unit tests
        run: /usr/local/bin/pnpm turbo test
