name: Agent Loop

on:
  push:
    branches:
      - 'feat/*'
      - 'fix/*'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── Stage 1: Agent Loop ──────────────────────────────────────────────────
  agent-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Agent Loop
        run: python3 /srv/monorepo/.claude/auto-kit/loop.py
        continue-on-error: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 2: Smoke tests ────────────────────────────────────────────────
  smoke:
    runs-on: ubuntu-latest
    needs: [agent-loop]
    steps:
      - uses: actions/checkout@v4

      - name: Run Smoke Tests
        run: bash /srv/monorepo/scripts/smoke-runner.sh
        continue-on-error: false

  # ── Stage 3: Create PR on success ──────────────────────────────────────
  create-pr:
    runs-on: ubuntu-latest
    needs: [smoke]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        run: |
          gh pr create --title "Agent loop: $(git rev-parse --short HEAD)" \
            --body "🤖 Generated by agent-loop CI" \
            --base main || echo "PR creation skipped (branch already has PR or no changes)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
