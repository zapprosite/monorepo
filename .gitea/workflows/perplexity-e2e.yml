name: Perplexity Agent E2E

on:
  push:
    branches:
      - main
    paths:
      - 'apps/perplexity-agent/**'
      - '.gitea/workflows/perplexity-e2e.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for the service'
        required: false
        default: 'http://localhost:4004'
        type: string

env:
  PERPLEXITY_CONTAINER: perplexity-agent
  DEFAULT_BASE_URL: http://localhost:4004

jobs:
  e2e:
    runs-on: [self-hosted]
    name: Playwright E2E Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine base URL
        id: resolve-url
        run: |
          BASE_URL="${{ inputs.base_url }}"
          if [[ -z "$BASE_URL" ]]; then
            BASE_URL="$DEFAULT_BASE_URL"
          fi
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT
          echo "Using BASE_URL: $BASE_URL"

      - name: Check Perplexity Agent is running
        run: |
          echo "=== Service Health Check ==="
          if ! docker ps --format '{{.Names}}' | grep -q "^${PERPLEXITY_CONTAINER}$"; then
            echo "❌ Container '$PERPLEXITY_CONTAINER' not running"
            echo "Available containers:"
            docker ps --format '{{.Names}}'
            exit 1
          fi
          echo "✅ Container '$PERPLEXITY_CONTAINER' is running"

      - name: Wait for service to be ready
        run: |
          ELAPSED=0
          TIMEOUT=30
          INTERVAL=2
          while [[ $ELAPSED -lt $TIMEOUT ]]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${{ steps.resolve-url.outputs.base_url }}/_stcore/health" 2>/dev/null || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Service is ready (HTTP 200, ${ELAPSED}s)"
              exit 0
            fi
            echo "[${ELAPSED}s] Health check: HTTP $HTTP_CODE"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "❌ Service did not become ready within ${TIMEOUT}s"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/perplexity-agent/package.json

      - name: Install Playwright
        run: |
          cd apps/perplexity-agent
          npm install -D @playwright/test
          npx playwright install chromium --with-deps
        env:
          PLAYWRIGHT_BROWSERS_PATH: /root/.cache/ms-playwright

      - name: Run E2E Tests
        run: |
          cd apps/perplexity-agent/e2e
          chmod +x run-e2e.sh
          ./run-e2e.sh
        env:
          BASE_URL: ${{ steps.resolve-url.outputs.base_url }}
          CI: 'true'
