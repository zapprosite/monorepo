name: CI

on:
  push:
    branches: [main, master, 'feat/*', 'fix/*']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd crm-mvp
          npm install -g pnpm
          pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd crm-mvp && pnpm tsc --noEmit || true
      - name: Lint
        run: cd crm-mvp && pnpm lint || true
      - name: Test
        run: cd crm-mvp && pnpm test || true
      - name: Build
        run: cd crm-mvp && pnpm build || true
