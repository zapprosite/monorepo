name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - run: pnpm turbo lint

      - run: pnpm turbo test

      - name: Update pipeline state
        if: success()
        run: echo "CI_PASSED=true" >> $GITHUB_STEP_SUMMARY
