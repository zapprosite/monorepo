services:
  orchestrator:
    image: python:3.11-slim
    container_name: hermes-orchestrator
    working_dir: /app
    volumes:
      - ./services/orchestrator:/app
    environment:
      - ORCHESTRATOR_DB=postgresql://crm:${ORCHESTRATOR_DB_PASS:-crm}@10.0.0.4:5432/crm_mvp
      - ORCHESTRATOR_PORT=8095
    ports:
      - "127.0.0.1:8095:8095"
    networks:
      - crm-mvp_default
    restart: unless-stopped
    command: ["bash", "-c", "pip install --no-cache-dir -r requirements.txt && python main.py"]

networks:
  crm-mvp_default:
    external: true
