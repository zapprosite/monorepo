version: '3.8'
services:
  fit-v2:
    build: .
    container_name: fit-v2
    restart: unless-stopped
    ports:
      - "127.0.0.1:4003:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
