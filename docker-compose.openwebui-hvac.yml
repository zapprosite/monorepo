services:
  openwebui-hvac:
    image: openwebui/open-webui:latest
    container_name: openwebui-hvac
    restart: unless-stopped
    env_file: /srv/monorepo/.env
    environment:
      - HOST=0.0.0.0
      - PORT=3456
      # HVAC Pipe — OpenAI-compatible backend at port 4017
      - OPENAI_API_BASE_URL=http://localhost:4017/v1
      - OPENAI_API_KEY=sk-local-zappro-clima
      # Expose ONLY zappro-clima-tutor model
      - DEFAULT_MODELS=zappro-clima-tutor
      - DEFAULT_PINNED_MODELS=zappro-clima-tutor
      - TASK_MODEL_EXTERNAL=zappro-clima-tutor
      # Disable Ollama to prevent other models from being exposed
      - ENABLE_OLLAMA_API=false
      # TTS Configuration — use existing zappro-edge-tts at 8012
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://localhost:8012/v1
      - AUDIO_TTS_OPENAI_API_KEY=not-needed
      - AUDIO_TTS_MODEL=tts-1
      - AUDIO_TTS_VOICE=pt-BR-FranciscaNeural
      - AUDIO_TTS_SPLIT_ON=punctuation
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/"]
      interval: 30s
      timeout: 10s
      retries: 3
