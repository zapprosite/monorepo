groups:
  - name: trieve-scrape-config
    interval: 30s
    scrape_configs:
      - job_name: trieve
        metrics_path: /api/v1/metrics
        scrape_interval: 30s
        static_configs:
          - targets:
              - localhost:6435
            labels:
              service: trieve
              env: production
        relabel_configs:
          - target_label: instance
            replacement: trieve
          - source_labels: [__address__]
            target_label: __param_target
            replacement: localhost:6435
          - source_labels: [__param_target]
            target_label: service
            replacement: trieve